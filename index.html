<body>

  <h1>メルカリ便 送料最安チェッカー</h1>

  <h2>厚さ</h2>
  <div class="radio-group">
    <label><input type="radio" name="thickness" value="3" checked><span>〜3cm</span></label>
    <label><input type="radio" name="thickness" value="5"><span>〜5cm</span></label>
    <label><input type="radio" name="thickness" value="7"><span>〜7cm</span></label>
    <label><input type="radio" name="thickness" value="999"><span>それ以上</span></label>
  </div>

	<h2>サイズ（3辺合計）</h2>
	<div class="radio-row">
	  <label><input type="radio" name="size" value="30" checked><span>〜30cm</span></label>
	  <label><input type="radio" name="size" value="60"><span>〜60cm</span></label>
	  <label><input type="radio" name="size" value="80"><span>〜80cm</span></label>
	  <label><input type="radio" name="size" value="100"><span>〜100cm</span></label>
	  <button type="button" id="moreBtn" class="more-btn">それ以上 ▼</button>
	</div>
	
	<div id="moreSizes" class="radio-row more-sizes hidden">
	  <label><input type="radio" name="size" value="120"><span>〜120cm</span></label>
	  <label><input type="radio" name="size" value="140"><span>〜140cm</span></label>
	  <label><input type="radio" name="size" value="160"><span>〜160cm</span></label>
	  <label><input type="radio" name="size" value="170"><span>〜170cm</span></label>
	  <label><input type="radio" name="size" value="180"><span>〜180cm</span></label>
	  <label><input type="radio" name="size" value="200"><span>〜200cm</span></label>
	  <label><input type="radio" name="size" value="250"><span>〜250cm</span></label>
	  <label><input type="radio" name="size" value="300"><span>〜300cm</span></label>
	  <label><input type="radio" name="size" value="350"><span>〜350cm</span></label>
	  <label><input type="radio" name="size" value="400"><span>〜400cm</span></label>
	  <label><input type="radio" name="size" value="450"><span>〜450cm</span></label>
	　<label><input type="radio" name="size" value="999"><span>450cm以上</span></label>
	</div>

  <h2>重さ</h2>
  <div class="radio-row">
    <label><input type="radio" name="weight" value="1" checked><span>〜1kg</span></label>
    <label><input type="radio" name="weight" value="2"><span>〜2kg</span></label>
    <label><input type="radio" name="weight" value="5"><span>〜5kg</span></label>
    <label><input type="radio" name="weight" value="10"><span>〜10kg</span></label>
    <label><input type="radio" name="weight" value="25"><span>〜25kg</span></label>
    <label><input type="radio" name="weight" value="30"><span>〜30kg</span></label>
    <label><input type="radio" name="weight" value="150"><span>それ以上</span></label>
  </div>

	<h2>発送場所（任意）</h2>
	<div class="checkbox-group">
	  <label><input type="checkbox" name="place" value="ヤマト運輸営業所">ヤマト営業所</label>
	  <label><input type="checkbox" name="place" value="セブン-イレブン">セブン</label>
	  <label><input type="checkbox" name="place" value="ファミリーマート">ファミマ</label>
	  <label><input type="checkbox" name="place" value="ローソン">ローソン</label>
	  <label><input type="checkbox" name="place" value="郵便局">郵便局</label>
	  <label><input type="checkbox" name="place" value="ポスト投函">ポスト</label>
	  <label><input type="checkbox" name="place" value="PUDO">PUDO</label>
	  <label><input type="checkbox" name="place" value="自宅集荷">自宅集荷</label>
	</div>
